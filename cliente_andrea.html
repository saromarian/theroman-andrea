<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Roman · Mi Tarjeta de Fidelidad</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#FBEAEA;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:1.5rem;font-family:'Lato',sans-serif}
    .card{background:#fff;max-width:420px;width:100%;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(142,0,0,0.15)}
    .top-band{background:#8E0000}
    .top-band svg{display:block;width:100%}
    .logo-area{text-align:center;padding:1.25rem 1rem 0.25rem}
    .logo-area img{width:65%;max-width:220px;height:auto;display:block;margin:0 auto}
    .gold-line{width:50px;height:1.5px;background:#c9a96e;margin:.5rem auto}
    .card-label{font-family:'Playfair Display',serif;font-size:11px;color:#c9a96e;text-align:center;letter-spacing:.25em;text-transform:uppercase;margin-bottom:.4rem}
    .client-name{font-family:'Playfair Display',serif;font-size:24px;color:#8E0000;text-align:center;font-style:italic;margin-bottom:.1rem}
    .client-sub{font-size:11px;color:#c9a96e;text-align:center;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.75rem}
    .stamps-section{padding:.75rem 1.5rem 1rem}
    .stamps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:.75rem}
    .stamp{aspect-ratio:1;border-radius:12px;border:1.5px solid #e8c8c8;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .stamp.filled{background:#f9f0f0;border-color:#c9a96e}
    .stamp.special{border-color:#8E0000;background:#fff5f5}
    .stamp.special.filled{background:#f9f0f0;border-color:#8E0000}
    .stamp-num{font-size:9px;color:#c9a96e;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.05em;margin-top:3px}
    .stamp.special .stamp-num{color:#8E0000}
    
    .progress-wrap{margin:.5rem 0}
    .progress-label{font-size:10px;color:#c9a96e;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;text-align:center}
    .progress-bar{height:6px;background:#f0dede;border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:#8E0000;border-radius:3px;transition:width .4s}
    .rewards{display:flex;flex-direction:column;gap:6px;margin-top:.75rem}
    .reward-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:#f9f0f0;border:.5px solid #e8c8c8}
    .reward-badge{min-width:28px;height:28px;border-radius:50%;background:#8E0000;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;color:#fff;font-style:italic;flex-shrink:0}
    .reward-text{font-size:12px;color:#2c1a1a;line-height:1.4}
    .reward-text b{color:#8E0000;font-weight:700}
    .thankyou{text-align:center;padding:.6rem 1rem .25rem;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;color:#5a3a3a}
    .bot-band{background:#8E0000;padding:.85rem 1rem;text-align:center;margin-top:.6rem}
    .bot-brand{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:#fff;letter-spacing:.12em}
    .bot-tag{font-size:9px;letter-spacing:.2em;color:#c9a96e;text-transform:uppercase;margin-top:2px}
    .admin-badge{background:#8E0000;color:#fff;font-size:10px;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:5px;font-family:'Lato',sans-serif}
    .status-msg{text-align:center;font-size:11px;color:#c9a96e;font-style:italic;padding:.3rem 0;min-height:18px}
  </style>
</head>

}

async function saveStamps(n) {
  await setDoc(docRef, { sellos: n, actualizado: new Date().toISOString() });
}

if (IS_ADMIN) {
  window.toggle = async function(i) {
    var snap = await getDoc(docRef);
    var current = snap.exists() ? snap.data().sellos : 0;
    var newVal = (i === current + 1) ? current + 1 : (i === current) ? current - 1 : current;
    await saveStamps(newVal);
    document.getElementById('status-msg').textContent = '✓ Guardado correctamente';
    setTimeout(() => document.getElementById('status-msg').textContent = '', 2000);
  };
}

onSnapshot(docRef, (snap) => {
  var n = snap.exists() ? snap.data().sellos : 0;
  render(n);
  document.getElementById('status-msg').textContent = '';
});
</script>
</body>
</html>
